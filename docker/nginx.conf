server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The .NET runtime bundle is content-hashed — cache it hard. (.wasm is served with the
    # correct application/wasm type by this nginx's stock mime.types.)
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The page + glue change in place (no hashing), so never let a stale copy stick.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
