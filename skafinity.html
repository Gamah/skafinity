<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>skafinity — endless procedural ska</title>
  <style>
:root {
  --bg: #15131f;
  --panel: #211d30;
  --ink: #f3eede;
  --muted: #9a93b0;
  --accent: #ffcb3d;   /* ska checker yellow */
  --accent2: #36d6a0;
  --line: #332c47;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font: 15px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  color: var(--ink);
  background:
    repeating-linear-gradient(45deg, #1a1727 0 24px, #17141f 24px 48px),
    var(--bg);
  min-height: 100vh;
}
main { max-width: 880px; margin: 0 auto; padding: 28px 18px 60px; }

header h1 { font-size: 40px; margin: 0; letter-spacing: -1px; }
header h1 span { color: var(--accent); }
.tag { color: var(--muted); margin: 4px 0 22px; }

button {
  background: var(--accent); color: #1a1320; border: 0; border-radius: 8px;
  padding: 8px 12px; font: inherit; font-weight: 700; cursor: pointer;
}
button:hover { filter: brightness(1.08); }
button.big { font-size: 20px; padding: 8px 18px; }

.transport { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.transport .now { color: var(--muted); margin-left: 6px; }
.transport .now b { color: var(--ink); }
.vol { margin-left: auto; color: var(--muted); display: flex; align-items: center; gap: 6px; }

.seedbar { display: flex; gap: 8px; margin-bottom: 20px; }
.seedbar input {
  flex: 1; background: #100e18; border: 1px solid var(--line); color: var(--ink);
  border-radius: 8px; padding: 9px 12px; font: inherit;
}

.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 720px) { .cols { grid-template-columns: 1fr; } }

.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
.panel h2 { margin: 0 0 12px; font-size: 16px; }
.panel h2 small { color: var(--muted); font-weight: 400; }

.playlist { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.plrow { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; }
.plrow:hover { background: #2a2440; }
.plrow.now { background: #2f2750; outline: 1px solid var(--accent); }
.pllabel { flex: 1; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.plstatus { color: var(--muted); font-size: 12px; min-width: 46px; text-align: right; }
.pldl { background: transparent; color: var(--accent2); padding: 2px 6px; }
.jump { margin-top: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.jump input[type=number] { width: 64px; background: #100e18; border: 1px solid var(--line); color: var(--ink); border-radius: 6px; padding: 5px; }
.export { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.export button { background: var(--accent2); }

.vibe { max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.vrow { display: grid; grid-template-columns: 96px 1fr 48px; align-items: center; gap: 8px; }
.vname { color: var(--muted); font-size: 12px; }
.vval { text-align: right; font-size: 12px; color: var(--accent); }
.vinput { width: 100%; }
select.vinput { background: #100e18; color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 4px; }
input[type=range] { accent-color: var(--accent); }

.status { color: #ff8a8a; min-height: 20px; }
footer { color: var(--muted); margin-top: 26px; font-size: 12px; border-top: 1px solid var(--line); padding-top: 14px; }
footer code { color: var(--accent); }

</style>
</head>
<body>
  <main>
    <header>
      <h1>ska<span>finity</span></h1>
      <p class="tag">an endless, deterministic procedural ska track — the whole song is a URL.</p>
    </header>

    <section class="transport">
      <button id="prevBtn" title="Previous song">⏮</button>
      <button id="playBtn" class="big" title="Play / Pause">▶</button>
      <button id="nextBtn" title="Next song">⏭</button>
      <span class="now">now playing <b>#<span id="nNow">0</span></b></span>
      <label class="vol">vol <input id="vol" type="range" min="0" max="1.5" step="0.01" value="0.8" /></label>
    </section>

    <section class="seedbar">
      <input id="seed" type="text" spellcheck="false" placeholder="vibe:tag:n  /  tag:n  /  tag" />
      <button id="seedGo">go</button>
      <button id="copyBtn">copy link</button>
    </section>

    <div class="cols">
      <section class="panel">
        <h2>playlist <small>n rolls forever →</small></h2>
        <div id="playlist" class="playlist"></div>
        <div class="jump">
          jump to <input id="jumpN" type="number" min="0" value="0" /> <button id="jumpBtn">go</button>
          <span class="export">
            <button id="dlBtn">⬇ download .wav</button>
            <label><input id="stereo" type="checkbox" /> stereo</label>
          </span>
        </div>
      </section>

      <section class="panel">
        <h2>vibe <small>shape the sound</small></h2>
        <div id="vibe" class="vibe"></div>
      </section>
    </div>

    <p id="status" class="status"></p>
    <footer>seed format <code>vibe:tag:n</code> · share the URL, get the same song · default export is mono (game parity)</footer>
  </main>
